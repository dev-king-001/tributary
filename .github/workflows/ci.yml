name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - run: rustup update stable && rustup target add wasm32v1-none
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - name: Check markdown links
        run: npx -y markdown-link-check -q README.md "docs/**/*.md"
      - run: cargo build --release --target wasm32v1-none -p tributary-splitter
      - name: Install wasm-opt (binaryen)
        run: sudo apt-get install -y binaryen
      - name: Optimize wasm and report size reduction
        run: |
          wasm=target/wasm32v1-none/release/tributary_splitter.wasm
          echo "Original size:"
          ls -lh "$wasm"
          wasm-opt -Oz -o /tmp/optimized.wasm "$wasm"
          echo "Optimized size:"
          ls -lh /tmp/optimized.wasm
          echo "Size reduced by $(($(stat -c%s "$wasm") - $(stat -c%s /tmp/optimized.wasm))) bytes"
          cp /tmp/optimized.wasm "$wasm"

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm install && npm run build
        working-directory: sdk
      - run: npm install && npm run build
        working-directory: app
